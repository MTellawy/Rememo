<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rememo | Minimal Typing Test</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.4.21/mammoth.browser.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;300;400;500;600&display=swap');

        :root {
            --bg-color: #121212;
            --text-main: #ffffff;
            --text-dim: #3a3a3a;       
            --ui-text-dim: #a0a0a0; /* Brighter gray for UI elements in dark mode */
            --text-keyword-hint: #777777; 
            --text-typed: #4fc3f7;     
            --text-error: #f44336;     
            --text-keyword: #ff9800; 
            --btn-bg: #2a2a2a;
            --btn-hover: #3a3a3a;
            --btn-border: #444444;
            --progress-bg: #222222;
            --header-bg: transparent;
            --overlay-bg: rgba(5, 5, 5, 0.7); 
            
            --type-font: 'Courier New', Courier, monospace;
            --type-size: 3rem; 
        }

        [data-theme="light"] {
            --bg-color: #f5f5f5;
            --text-main: #121212;
            --text-dim: #d0d0d0;       
            --ui-text-dim: #606060; /* Darker gray for UI elements in light mode */
            --text-keyword-hint: #999999; 
            --text-typed: #0288d1;    
            --text-error: #d32f2f;     
            --text-keyword: #e65100; 
            --btn-bg: #e0e0e0;
            --btn-hover: #cccccc;
            --btn-border: #bbbbbb;
            --progress-bg: #e0e0e0;
            --header-bg: transparent;
            --overlay-bg: rgba(240, 240, 240, 0.7);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            transition: background-color 0.3s, border-color 0.3s;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--type-font);
            font-weight: 400; 
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden; 
            
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
        }

        @keyframes flash-screen-error {
            0% { background-color: rgba(244, 67, 54, 0.15); }
            100% { background-color: var(--bg-color); }
        }

        body.error-state {
            animation: flash-screen-error 0.3s ease-out;
        }

        .progress-container {
            width: 100%;
            height: 4px;
            background-color: var(--progress-bg);
            position: fixed;
            top: 0;
            left: 0;
            z-index: 100;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background-color: var(--text-typed);
            transition: width 0.2s ease-out;
        }

        header {
            flex-shrink: 0;
            padding: 1.5rem 2.5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: var(--header-bg);
            min-height: 90px;
            margin-top: 4px;
            z-index: 10;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            font-size: 1.8rem;
            font-family: 'Poppins', sans-serif !important; 
            font-weight: 300;
            color: var(--text-main);
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            stroke: var(--text-typed);
        }

        .toolbar {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            flex-wrap: wrap;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-5px);
            transition: opacity 0.3s ease, transform 0.3s ease, visibility 0.3s ease;
        }

        header:hover .toolbar {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .btn-group {
            display: flex;
            align-items: stretch;
            background-color: transparent;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid var(--btn-border);
        }

        .btn-group > * {
            border-right: 1px solid var(--btn-border);
        }

        .btn-group > *:last-child {
            border-right: none;
        }

        .btn-tool, .seg-btn {
            background: transparent;
            border: none;
            color: var(--text-main);
            width: 44px;
            height: 42px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            outline: none;
            font-family: 'Poppins', sans-serif; 
        }

        .btn-tool:hover {
            background-color: var(--btn-hover);
        }

        .btn-tool:active {
            background-color: var(--btn-border);
        }

        .btn-tool svg, .seg-btn svg {
            width: 18px;
            height: 18px;
            stroke-width: 1.2;
        }

        .seg-btn {
            color: var(--ui-text-dim);
        }

        .seg-btn:hover:not(.active) {
            background-color: var(--btn-hover);
            color: var(--text-main);
        }

        .seg-btn.active {
            background-color: var(--text-typed);
            color: #ffffff;
        }

        [data-theme="light"] .seg-btn.active {
            color: #ffffff;
        }

        #file-upload { display: none; }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            width: 100%;
            min-height: 0;
            position: relative;
        }

        .text-overlay-container {
            flex: 1;
            width: 100%;
            overflow-y: auto;
            position: relative;
            background: transparent;
            cursor: text;
        }

        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background-color: var(--text-typed);
            border-radius: 10px;
        }

        #text-display {
            font-family: var(--type-font);
            font-size: var(--type-size);
            font-weight: 400; 
            line-height: 1.8;
            letter-spacing: 0px;
            word-spacing: 2px;
            padding: 2rem 10% 20rem 10%; 
            white-space: pre-wrap;
            word-break: break-word;
            pointer-events: none;
        }

        #hidden-input {
            position: fixed;
            top: -1000px; 
            left: -1000px;
            opacity: 0;
            pointer-events: none;
        }

        #text-display span {
            font-family: inherit; 
            position: relative;
            display: inline;
            transition: color 0.15s ease; 
        }

        #text-display span.correct {
            color: var(--text-typed) !important;
        }

        #text-display span:not(.correct) {
            color: var(--text-dim);
        }

        #text-display span.is-keyword:not(.correct) {
            color: var(--text-keyword-hint); 
        }

        #text-display span.is-keyword.correct {
            color: var(--text-keyword) !important; 
        }

        /* Hard Mode logic */
        body[data-mode="hard"] #text-display span:not(.correct) {
            color: transparent;
        }

        body[data-mode="hard"].reveal-hint #text-display span:not(.correct) {
            color: var(--text-dim);
        }
        
        body[data-mode="hard"].reveal-hint #text-display span.is-keyword:not(.correct) {
            color: var(--text-keyword-hint);
        }

        body[data-mode="hard"].reveal-keywords #text-display span.is-keyword:not(.correct) {
            color: var(--text-keyword-hint);
        }

        #text-display span.caret::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0.1em;
            height: 1.2em;
            width: 2px;
            background-color: var(--text-typed);
            animation: blink 1s infinite;
            z-index: 5;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        #drag-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--overlay-bg);
            color: var(--text-main);
            display: none;
            justify-content: center;
            align-items: center;
            font-size: 2.5rem;
            font-weight: 600;
            z-index: 999;
            backdrop-filter: blur(5px);
            font-family: 'Poppins', sans-serif;
        }
        #drag-overlay.active { display: flex; }

        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: var(--overlay-bg);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: none; justify-content: center; align-items: center; z-index: 2000;
            opacity: 0; transition: opacity 0.5s ease;
        }
        .modal-overlay.active { display: flex; opacity: 1; }
        
        .modal-content {
            background: transparent; 
            border: none;
            width: 100%; 
            max-width: 800px;
            display: flex;
            flex-direction: column;
            color: var(--text-main); 
            font-family: 'Poppins', sans-serif;
            transform: translateY(20px); 
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: center;
            margin: 0 auto;
        }
        .modal-overlay.active .modal-content { transform: translateY(0); }

        .modal-close {
            position: fixed; top: 3rem; right: 4rem; background: none; border: none;
            color: var(--ui-text-dim); cursor: pointer; transition: color 0.3s, transform 0.3s; outline: none;
            transform: scale(2);
        }
        .modal-close:hover { color: var(--text-main); transform: scale(2.2); }
        .modal-close svg { width: 24px; height: 24px; stroke-width: 0.8; }

        .settings-title {
            font-weight: 100;
            font-size: 2rem;
            letter-spacing: 12px;
            text-transform: uppercase;
            margin-bottom: 4rem;
            color: var(--text-main);
            text-align: center;
        }

        /* Perfect Center Alignment for Grid */
        .settings-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            row-gap: 1.8rem;
            column-gap: 4rem;
            align-items: center;
            margin-bottom: 4rem;
            width: 100%;
        }

        .setting-label {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            text-align: right;
            font-weight: 200; 
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: var(--ui-text-dim);
            width: 100%;
        }

        .setting-control {
            display: flex;
            justify-content: flex-start;
            align-items: center;
            text-align: left;
            position: relative;
            width: 100%;
        }

        .modal-select, .modal-input, .modal-textarea {
            background: transparent;
            color: var(--text-main);
            border: none;
            border-bottom: 1px solid transparent;
            font-family: 'Poppins', sans-serif;
            font-weight: 200;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            outline: none;
            appearance: none;
            -webkit-appearance: none;
            padding: 0.2rem 0;
            transition: border-color 0.3s, color 0.3s;
            width: auto;
            min-width: 150px;
        }

        .modal-select:hover, .modal-input:hover, .modal-input:focus, .modal-textarea:focus, .modal-textarea:hover {
            border-bottom: 1px solid var(--ui-text-dim);
        }

        .modal-select option {
            background: var(--bg-color);
            color: var(--text-main);
            font-weight: 300;
            text-transform: none;
            letter-spacing: normal;
        }

        .modal-input {
            width: 60px;
            min-width: 60px;
            cursor: text;
            text-align: center;
        }

        .modal-textarea {
            width: 100%;
            min-height: 60px;
            resize: vertical;
            text-transform: none;
            letter-spacing: normal;
            font-size: 1rem;
        }

        .settings-actions {
            display: flex;
            gap: 2rem;
            justify-content: center;
            align-items: center;
            width: 100%;
        }

        .btn-save, .btn-reset {
            background: transparent;
            color: var(--ui-text-dim);
            border: 1px solid var(--ui-text-dim);
            padding: 1rem 3rem;
            font-family: 'Poppins', sans-serif;
            font-weight: 100;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 6px;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.4s ease;
        }

        .btn-save:hover {
            background: var(--text-main);
            color: var(--bg-color);
            border-color: var(--text-main);
        }

        .btn-reset:hover {
            color: var(--text-error);
            border-color: var(--text-error);
        }

        .btn-save:active, .btn-reset:active { transform: scale(0.98); }

        #success-icon-anim {
            width: 100px;
            height: 100px;
            margin: 0 auto 2rem auto;
            display: block;
            stroke: var(--text-typed);
        }

        .success-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

    </style>
</head>
<body data-mode="easy">

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
    </script>

    <div class="progress-container">
        <div class="progress-bar" id="progress-bar"></div>
    </div>

    <div id="drag-overlay">Drop file to load text...</div>

    <div class="modal-overlay" id="success-overlay">
        <div class="modal-content success-wrapper">
            <svg id="success-icon-anim" viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="1">
                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                <polyline points="22 4 12 14.01 9 11.01"></polyline>
            </svg>
            <h2 class="settings-title" style="margin-bottom: 2rem; font-size: 1.8rem; line-height: 1.5; letter-spacing: 8px;">Mission<br>Accomplished</h2>
            <button id="btn-close-success" class="btn-save">Continue</button>
        </div>
    </div>

    <div class="modal-overlay" id="keywords-modal">
        <button class="modal-close" id="btn-close-keywords" title="Close">
            <svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
        <div class="modal-content">
            <h2 class="settings-title">Keywords</h2>
            <p style="margin-bottom: 2rem; font-weight: 200; font-size: 1rem; color: var(--ui-text-dim); text-transform: uppercase; letter-spacing: 2px;">Enter dot separated words</p>
            <textarea id="set-keywords" class="modal-textarea" placeholder="e.g. A man's. realm. decision."></textarea>
            <br>
            <button id="btn-save-keywords" class="btn-save" style="margin-top: 2rem;">Save Keywords</button>
        </div>
    </div>

    <div class="modal-overlay" id="settings-modal">
        <button class="modal-close" id="btn-close-settings" title="Close Settings">
            <svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
        <div class="modal-content">
            <h2 class="settings-title">Settings</h2>
            
            <div class="settings-grid">
                <div class="setting-label">Theme</div>
                <div class="setting-control">
                    <select id="set-theme" class="modal-select">
                        <option value="dark">Dark</option>
                        <option value="light">Light</option>
                    </select>
                </div>
                
                <div class="setting-label">Mode</div>
                <div class="setting-control">
                    <select id="set-mode" class="modal-select">
                        <option value="easy">Easy</option>
                        <option value="hard">Hard</option>
                    </select>
                </div>

                <div class="setting-label">Font Family</div>
                <div class="setting-control">
                    <select id="set-font" class="modal-select"></select>
                </div>

                <div class="setting-label">Font Size</div>
                <div class="setting-control">
                    <input type="number" id="set-size" class="modal-input" min="1" max="6" step="0.2">
                </div>

                <div class="setting-label">Reader Voice</div>
                <div class="setting-control">
                    <select id="set-voice" class="modal-select"></select>
                </div>

                <div class="setting-label">Reading Speed</div>
                <div class="setting-control">
                    <input type="number" id="set-speed" class="modal-input" min="0.5" max="3.0" step="0.25">
                </div>
            </div>

            <div class="settings-actions">
                <button id="btn-reset-settings" class="btn-reset">Reset</button>
                <button id="btn-save-settings" class="btn-save">Apply Defaults</button>
            </div>
        </div>
    </div>

    <header>
        <div class="logo-area">
            <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M9.5 2a2.5 2.5 0 0 1 2.5 2.5v15a2.5 2.5 0 0 1-5 0c0-.36.08-.7.22-1-.87-.36-1.54-1.13-1.7-2.06A3 3 0 0 1 3 11a2.5 2.5 0 0 1 1.76-2.4 2.5 2.5 0 0 1 .74-4.1A2.5 2.5 0 0 1 9.5 2Z"/>
                <path d="M14.5 2a2.5 2.5 0 0 0-2.5 2.5v15a2.5 2.5 0 0 0 5 0c0-.36-.08-.7-.22-1 .87-.36 1.54-1.13 1.7-2.06A3 3 0 0 0 21 11a2.5 2.5 0 0 0-1.76-2.4 2.5 2.5 0 0 0-.74-4.1A2.5 2.5 0 0 0 14.5 2Z"/>
            </svg>
            Rememo
        </div>
        
        <div class="toolbar">
            
            <div class="btn-group">
                <button class="seg-btn" data-mode="easy" title="Easy Mode">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                </button>
                <button class="seg-btn" data-mode="hard" title="Hard Mode">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                </button>
            </div>

            <div class="btn-group">
                <button class="btn-tool" id="btn-font-prev" title="Previous Font">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
                </button>
                <button class="btn-tool" id="btn-font-dec" title="Decrease Font Size">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/></svg>
                </button>
                <button class="btn-tool" id="btn-font-inc" title="Increase Font Size">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                </button>
                <button class="btn-tool" id="btn-font-next" title="Next Font">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
                </button>
            </div>

            <div class="btn-group">
                <button class="btn-tool" id="btn-speed-dec" title="Decrease Voice Speed">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
                </button>
                <button class="btn-tool" id="btn-read" title="Read Text (Listen)">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
                </button>
                <button class="btn-tool" id="btn-speed-inc" title="Increase Voice Speed">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
                </button>
            </div>

            <div class="btn-group">
                <button class="btn-tool" id="btn-skip-back" title="Skip Backward (Sentence or Shift for Word)">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 19 2 12 11 5 11 19"></polygon><polygon points="22 19 13 12 22 5 22 19"></polygon></svg>
                </button>
                <button class="btn-tool" id="btn-restart" title="Start Over">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                </button>
                <button class="btn-tool" id="btn-skip-fwd" title="Skip Forward (Sentence or Shift for Word)">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 19 22 12 13 5 13 19"></polygon><polygon points="2 19 11 12 2 5 2 19"></polygon></svg>
                </button>
            </div>

            <div class="btn-group">
                <button class="btn-tool" id="btn-keywords" title="Add Keywords">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.58a2 2 0 0 1 0 2.83z"></path><line x1="7" y1="7" x2="7.01" y2="7"></line></svg>
                </button>
                <button class="btn-tool" id="btn-settings" title="Settings">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                </button>
            </div>

            <div class="btn-group">
                <button class="btn-tool" id="btn-upload" title="Upload Document (TXT, PDF, Word)">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                </button>
            </div>
            
            <input type="file" id="file-upload" accept=".txt,.pdf,.doc,.docx" />
        </div>
    </header>

    <main>
        <div class="text-overlay-container" id="overlay-container">
            <div id="text-display"></div>
            <textarea id="hidden-input" spellcheck="false" autocomplete="off"></textarea>
        </div>
    </main>

    <script>
        const defaultSettings = {
            theme: 'dark',
            mode: 'easy',
            fontIndex: 3, 
            fontSize: 3,  
            speechRate: 1.0,
            voiceURI: '',
            keywords: []
        };

        let appSettings = JSON.parse(localStorage.getItem('rememo_settings')) || { ...defaultSettings };
        if(!appSettings.keywords) appSettings.keywords = [];

        function saveSettings() {
            localStorage.setItem('rememo_settings', JSON.stringify(appSettings));
        }

        let targetText = "";
        let lastValidInput = "";
        let currentMode = appSettings.mode;
        let currentFontIndex = appSettings.fontIndex;
        let currentFontSize = parseFloat(appSettings.fontSize);
        let speechRate = parseFloat(appSettings.speechRate);
        
        let keywordIndices = new Set();
        let sentenceBoundaries = [0];
        let wordBoundaries = [0];

        const synth = window.speechSynthesis;
        let preferredVoice = null;
        let isSpeaking = false;
        let currentSpokenIndex = 0;

        const fonts = [
            { name: 'Poppins', value: "'Poppins', sans-serif" },
            { name: 'Arial', value: "Arial, sans-serif" },
            { name: 'Times New Roman', value: "'Times New Roman', serif" },
            { name: 'Courier New', value: "'Courier New', Courier, monospace" },
            { name: 'Georgia', value: "Georgia, serif" }
        ];

        const hiddenInput = document.getElementById('hidden-input');
        const textDisplay = document.getElementById('text-display');
        const overlayContainer = document.getElementById('overlay-container');
        const progressBar = document.getElementById('progress-bar');
        
        const modeBtns = document.querySelectorAll('.seg-btn');
        
        const btnFontPrev = document.getElementById('btn-font-prev');
        const btnFontNext = document.getElementById('btn-font-next');
        const btnFontInc = document.getElementById('btn-font-inc');
        const btnFontDec = document.getElementById('btn-font-dec');
        
        const btnSpeedInc = document.getElementById('btn-speed-inc');
        const btnSpeedDec = document.getElementById('btn-speed-dec');
        const btnRead = document.getElementById('btn-read');
        const btnRestart = document.getElementById('btn-restart');
        
        const btnSkipBack = document.getElementById('btn-skip-back');
        const btnSkipFwd = document.getElementById('btn-skip-fwd');

        const btnKeywords = document.getElementById('btn-keywords');
        const keywordsModal = document.getElementById('keywords-modal');
        const btnCloseKeywords = document.getElementById('btn-close-keywords');
        const btnSaveKeywords = document.getElementById('btn-save-keywords');
        const keywordsInput = document.getElementById('set-keywords');
        
        const btnUpload = document.getElementById('btn-upload');
        const fileUpload = document.getElementById('file-upload');
        const dragOverlay = document.getElementById('drag-overlay');

        const btnSettings = document.getElementById('btn-settings');
        const settingsModal = document.getElementById('settings-modal');
        const btnCloseSettings = document.getElementById('btn-close-settings');
        const btnSaveSettings = document.getElementById('btn-save-settings');
        const btnResetSettings = document.getElementById('btn-reset-settings');
        const fontSelect = document.getElementById('set-font');
        const voiceSelect = document.getElementById('set-voice');

        const successOverlay = document.getElementById('success-overlay');
        const btnCloseSuccess = document.getElementById('btn-close-success');

        function populateVoices() {
            voiceSelect.innerHTML = '';
            const voices = synth.getVoices();
            voices.forEach(voice => {
                const option = document.createElement('option');
                option.textContent = `${voice.name} (${voice.lang})`;
                option.value = voice.voiceURI;
                if (voice.voiceURI === appSettings.voiceURI) {
                    option.selected = true;
                }
                voiceSelect.appendChild(option);
            });
        }

        function setPreferredVoice() {
            const voices = synth.getVoices();
            if (voices.length === 0) return;

            if (appSettings.voiceURI) {
                preferredVoice = voices.find(v => v.voiceURI === appSettings.voiceURI);
            }

            if (!preferredVoice) preferredVoice = voices.find(v => v.name.includes('Brian'));
            if (!preferredVoice) preferredVoice = voices.find(v => v.name.includes('Google') && v.lang.startsWith('en'));
            if (!preferredVoice) preferredVoice = voices.find(v => v.lang.startsWith('en'));
            if (!preferredVoice) preferredVoice = voices[0];

            if (preferredVoice) {
                appSettings.voiceURI = preferredVoice.voiceURI;
                saveSettings();
            }
            populateVoices();
        }

        if (speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = setPreferredVoice;
        }

        function applySettingsToUI() {
            document.documentElement.setAttribute('data-theme', appSettings.theme);
            
            currentMode = appSettings.mode;
            document.body.setAttribute('data-mode', currentMode);
            modeBtns.forEach(b => b.classList.toggle('active', b.dataset.mode === currentMode));

            currentFontIndex = parseInt(appSettings.fontIndex);
            document.documentElement.style.setProperty('--type-font', fonts[currentFontIndex].value);

            currentFontSize = parseFloat(appSettings.fontSize);
            document.documentElement.style.setProperty('--type-size', `${currentFontSize}rem`);

            speechRate = parseFloat(appSettings.speechRate);
            setPreferredVoice();
            calculateKeywordIndices();
        }

        function populateFontSelect() {
            fontSelect.innerHTML = '';
            fonts.forEach((f, i) => {
                const opt = document.createElement('option');
                opt.value = i;
                opt.textContent = f.name;
                if(i === appSettings.fontIndex) opt.selected = true;
                fontSelect.appendChild(opt);
            });
        }

        btnSettings.addEventListener('click', () => {
            document.getElementById('set-theme').value = appSettings.theme;
            document.getElementById('set-mode').value = appSettings.mode;
            document.getElementById('set-size').value = appSettings.fontSize;
            document.getElementById('set-speed').value = appSettings.speechRate;
            populateFontSelect();
            populateVoices();
            settingsModal.classList.add('active');
        });

        btnCloseSettings.addEventListener('click', () => {
            settingsModal.classList.remove('active');
            hiddenInput.focus();
        });

        settingsModal.addEventListener('click', (e) => {
            if (e.target === settingsModal) {
                settingsModal.classList.remove('active');
                hiddenInput.focus();
            }
        });

        btnSaveSettings.addEventListener('click', () => {
            appSettings.theme = document.getElementById('set-theme').value;
            appSettings.mode = document.getElementById('set-mode').value;
            appSettings.fontIndex = parseInt(fontSelect.value);
            appSettings.fontSize = parseFloat(document.getElementById('set-size').value);
            appSettings.speechRate = parseFloat(document.getElementById('set-speed').value);
            appSettings.voiceURI = voiceSelect.value;
            
            saveSettings();
            applySettingsToUI();
            settingsModal.classList.remove('active');
            
            if(isSpeaking) {
                synth.cancel();
                setTimeout(() => { speakText(currentSpokenIndex); }, 50);
            }
            hiddenInput.focus();
        });

        btnResetSettings.addEventListener('click', () => {
            const preservedKeywords = appSettings.keywords;
            appSettings = { ...defaultSettings, keywords: preservedKeywords };
            saveSettings();
            applySettingsToUI();

            document.getElementById('set-theme').value = appSettings.theme;
            document.getElementById('set-mode').value = appSettings.mode;
            document.getElementById('set-size').value = appSettings.fontSize;
            document.getElementById('set-speed').value = appSettings.speechRate;
            fontSelect.value = appSettings.fontIndex;
            voiceSelect.value = appSettings.voiceURI;

            if(isSpeaking) {
                synth.cancel();
                setTimeout(() => { speakText(currentSpokenIndex); }, 50);
            }
            hiddenInput.focus();
        });

        modeBtns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                const targetBtn = e.target.closest('.seg-btn');
                appSettings.mode = targetBtn.getAttribute('data-mode');
                saveSettings();
                applySettingsToUI();
                hiddenInput.focus();
            });
        });

        btnFontPrev.addEventListener('click', () => {
            appSettings.fontIndex = (appSettings.fontIndex - 1 + fonts.length) % fonts.length;
            saveSettings();
            applySettingsToUI();
            hiddenInput.focus();
        });

        btnFontNext.addEventListener('click', () => {
            appSettings.fontIndex = (appSettings.fontIndex + 1) % fonts.length;
            saveSettings();
            applySettingsToUI();
            hiddenInput.focus();
        });

        btnFontInc.addEventListener('click', () => {
            if(appSettings.fontSize < 6) appSettings.fontSize = parseFloat((appSettings.fontSize + 0.2).toFixed(1));
            saveSettings();
            applySettingsToUI();
            hiddenInput.focus();
        });

        btnFontDec.addEventListener('click', () => {
            if(appSettings.fontSize > 1) appSettings.fontSize = parseFloat((appSettings.fontSize - 0.2).toFixed(1));
            saveSettings();
            applySettingsToUI();
            hiddenInput.focus();
        });

        function calculateSentenceBoundaries() {
            sentenceBoundaries = [0];
            const regex = /([.?!]\s+|\n+)/g;
            let match;
            while ((match = regex.exec(targetText)) !== null) {
                sentenceBoundaries.push(match.index + match[0].length);
            }
            if (sentenceBoundaries[sentenceBoundaries.length - 1] !== targetText.length) {
                sentenceBoundaries.push(targetText.length);
            }
            sentenceBoundaries = [...new Set(sentenceBoundaries)].sort((a,b) => a-b);
        }

        function calculateWordBoundaries() {
            wordBoundaries = [0];
            let inWord = false;
            for(let i=0; i<targetText.length; i++) {
                const isWordChar = /[a-zA-Z0-9'\u0600-\u06FF]/.test(targetText[i]);
                if(isWordChar && !inWord) {
                    wordBoundaries.push(i);
                    inWord = true;
                } else if (!isWordChar) {
                    inWord = false;
                }
            }
            if(wordBoundaries[wordBoundaries.length - 1] !== targetText.length) {
                wordBoundaries.push(targetText.length);
            }
            wordBoundaries = [...new Set(wordBoundaries)].sort((a,b) => a-b);
        }

        function calculateKeywordIndices() {
            keywordIndices.clear();
            if(!appSettings.keywords || appSettings.keywords.length === 0 || !targetText) return;

            const escapeRegExp = (string) => string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');

            appSettings.keywords.forEach(kw => {
                if(!kw) return;
                const regex = new RegExp(`(^|[^a-zA-Z0-9'\u0600-\u06FF])(${escapeRegExp(kw)})(?=[^a-zA-Z0-9'\u0600-\u06FF]|$)`, 'gi');
                let match;
                while ((match = regex.exec(targetText)) !== null) {
                    const matchStart = match.index + match[1].length;
                    for(let i = 0; i < kw.length; i++) {
                        keywordIndices.add(matchStart + i);
                    }
                }
            });
            updateSpans();
        }

        btnKeywords.addEventListener('click', () => {
            keywordsInput.value = (appSettings.keywords || []).join('. ') + ((appSettings.keywords && appSettings.keywords.length > 0) ? '.' : '');
            keywordsModal.classList.add('active');
        });

        btnCloseKeywords.addEventListener('click', () => {
            keywordsModal.classList.remove('active');
            hiddenInput.focus();
        });

        btnSaveKeywords.addEventListener('click', () => {
            const val = keywordsInput.value;
            appSettings.keywords = val.split('.').map(s => s.trim()).filter(Boolean);
            saveSettings();
            calculateKeywordIndices();
            keywordsModal.classList.remove('active');
            hiddenInput.focus();
        });

        function skipForward() {
            if(!targetText) return;
            const currentLen = hiddenInput.value.length;
            const next = sentenceBoundaries.find(b => b > currentLen);
            if (next !== undefined) {
                hiddenInput.value = targetText.substring(0, next);
                processTyping();
            }
        }

        function skipBackward() {
            if(!targetText) return;
            const currentLen = hiddenInput.value.length;
            const prevBounds = sentenceBoundaries.filter(b => b < currentLen);
            const prev = prevBounds.length > 0 ? prevBounds[prevBounds.length - 1] : 0;
            hiddenInput.value = targetText.substring(0, prev);
            processTyping();
        }

        function skipWordForward() {
            if(!targetText) return;
            const currentLen = hiddenInput.value.length;
            const next = wordBoundaries.find(b => b > currentLen);
            if (next !== undefined) {
                hiddenInput.value = targetText.substring(0, next);
                processTyping();
            }
        }

        function skipWordBackward() {
            if(!targetText) return;
            const currentLen = hiddenInput.value.length;
            const prevBounds = wordBoundaries.filter(b => b < currentLen);
            const prev = prevBounds.length > 0 ? prevBounds[prevBounds.length - 1] : 0;
            hiddenInput.value = targetText.substring(0, prev);
            processTyping();
        }

        btnSkipFwd.addEventListener('click', () => { skipForward(); hiddenInput.focus(); });
        btnSkipBack.addEventListener('click', () => { skipBackward(); hiddenInput.focus(); });

        function speakText(startIndex = 0) {
            if (synth.speaking) synth.cancel();
            if (startIndex >= targetText.length) return;

            const textToSpeak = targetText.substring(startIndex);
            const utterance = new SpeechSynthesisUtterance(textToSpeak);
            utterance.rate = speechRate;
            
            if (preferredVoice) {
                utterance.voice = preferredVoice;
            }

            utterance.onboundary = (event) => {
                if (event.name === 'word') {
                    currentSpokenIndex = startIndex + event.charIndex;
                }
            };

            utterance.onstart = () => {
                isSpeaking = true;
                btnRead.style.color = 'var(--text-typed)';
            };

            utterance.onend = () => {
                isSpeaking = false;
                btnRead.style.color = 'var(--text-main)';
                currentSpokenIndex = 0;
            };
            
            utterance.onerror = () => {
                isSpeaking = false;
                btnRead.style.color = 'var(--text-main)';
            }

            synth.speak(utterance);
        }

        btnSpeedInc.addEventListener('click', () => {
            if(appSettings.speechRate < 3.0) {
                appSettings.speechRate = parseFloat((appSettings.speechRate + 0.25).toFixed(2));
                saveSettings();
                applySettingsToUI();
                if(isSpeaking) {
                    synth.cancel();
                    setTimeout(() => { speakText(currentSpokenIndex); }, 50);
                }
            }
            hiddenInput.focus();
        });

        btnSpeedDec.addEventListener('click', () => {
            if(appSettings.speechRate > 0.5) {
                appSettings.speechRate = parseFloat((appSettings.speechRate - 0.25).toFixed(2));
                saveSettings();
                applySettingsToUI();
                if(isSpeaking) {
                    synth.cancel();
                    setTimeout(() => { speakText(currentSpokenIndex); }, 50);
                }
            }
            hiddenInput.focus();
        });

        btnRead.addEventListener('click', () => {
            if (isSpeaking) {
                synth.cancel(); 
                isSpeaking = false;
                btnRead.style.color = 'var(--text-main)';
            } else {
                if (!preferredVoice) setPreferredVoice();
                currentSpokenIndex = 0;
                speakText(0);
            }
            hiddenInput.focus();
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Control' && currentMode === 'hard') {
                document.body.classList.add('reveal-hint');
            }
            if (e.key === 'Alt' && currentMode === 'hard') {
                e.preventDefault(); 
                document.body.classList.add('reveal-keywords');
            }
            if (e.key === 'ArrowRight' && document.activeElement === hiddenInput) {
                e.preventDefault();
                if (e.shiftKey) skipWordForward();
                else skipForward();
            }
            if (e.key === 'ArrowLeft' && document.activeElement === hiddenInput) {
                e.preventDefault();
                if (e.shiftKey) skipWordBackward();
                else skipBackward();
            }
        });

        document.addEventListener('keyup', (e) => {
            if (e.key === 'Control') {
                document.body.classList.remove('reveal-hint');
            }
            if (e.key === 'Alt') {
                document.body.classList.remove('reveal-keywords');
            }
        });

        window.addEventListener('blur', () => {
            document.body.classList.remove('reveal-hint');
            document.body.classList.remove('reveal-keywords');
        });

        overlayContainer.addEventListener('click', () => {
            hiddenInput.focus();
        });

        btnCloseSuccess.addEventListener('click', () => {
            successOverlay.classList.remove('active');
            initText(targetText);
        });

        function initText(rawText) {
            targetText = rawText.replace(/\r\n/g, "\n").replace(/\n{3,}/g, "\n\n").trim();
            
            calculateSentenceBoundaries();
            calculateWordBoundaries();

            textDisplay.innerHTML = '';
            for (let i = 0; i < targetText.length; i++) {
                const span = document.createElement('span');
                span.textContent = targetText[i];
                textDisplay.appendChild(span);
            }
            const endSpan = document.createElement('span');
            textDisplay.appendChild(endSpan);
            
            hiddenInput.value = '';
            lastValidInput = '';
            progressBar.style.width = `0%`;
            hiddenInput.disabled = false;
            
            calculateKeywordIndices();
            
            if (synth.speaking) {
                synth.cancel();
                isSpeaking = false;
                btnRead.style.color = 'var(--text-main)';
            }

            setTimeout(() => hiddenInput.focus(), 50);
        }

        btnUpload.addEventListener('click', () => fileUpload.click());

        fileUpload.addEventListener('change', (e) => {
            if(e.target.files.length > 0) processFile(e.target.files[0]);
            e.target.value = '';
        });

        window.addEventListener('dragover', (e) => {
            e.preventDefault();
            dragOverlay.classList.add('active');
        });

        window.addEventListener('dragleave', (e) => {
            if (e.target === dragOverlay) {
                dragOverlay.classList.remove('active');
            }
        });

        window.addEventListener('drop', (e) => {
            e.preventDefault();
            dragOverlay.classList.remove('active');
            if (e.dataTransfer.files.length > 0) {
                processFile(e.dataTransfer.files[0]);
            }
        });

        async function processFile(file) {
            const name = file.name.toLowerCase();
            if (name.endsWith('.txt')) {
                const text = await file.text();
                initText(text);
            } 
            else if (name.endsWith('.docx') || name.endsWith('.doc')) {
                const arrayBuffer = await file.arrayBuffer();
                mammoth.extractRawText({arrayBuffer: arrayBuffer})
                    .then(result => initText(result.value))
                    .catch(err => alert("Error loading document."));
            } 
            else if (name.endsWith('.pdf')) {
                try {
                    const arrayBuffer = await file.arrayBuffer();
                    const pdf = await pdfjsLib.getDocument({data: arrayBuffer}).promise;
                    let fullText = '';
                    
                    for (let i = 1; i <= pdf.numPages; i++) {
                        const page = await pdf.getPage(i);
                        const textContent = await page.getTextContent();
                        let lastY = null;
                        let line = '';
                        for (let item of textContent.items) {
                            if (lastY !== null && Math.abs(lastY - item.transform[5]) > 5) {
                                fullText += line + '\n';
                                line = '';
                            }
                            line += item.str;
                            lastY = item.transform[5];
                        }
                        fullText += line + '\n\n';
                    }
                    initText(fullText);
                } catch(e) {
                    alert("Error loading PDF.");
                }
            } else {
                alert("Unsupported format.");
            }
        }

        function processTyping() {
            const typed = hiddenInput.value;

            if (typed === "") {
                lastValidInput = "";
                updateProgress();
                updateSpans();
                return;
            }

            const targetSub = targetText.substring(0, typed.length);
            
            if (typed.toLowerCase() === targetSub.toLowerCase()) {
                lastValidInput = targetSub;
                hiddenInput.value = targetSub; 
                
                document.body.classList.remove('error-state');
                updateProgress();
                updateSpans();
                
                const caretSpan = textDisplay.querySelector('.caret');
                if (caretSpan) {
                    const caretRect = caretSpan.getBoundingClientRect();
                    const containerRect = overlayContainer.getBoundingClientRect();
                    
                    if (caretRect.bottom > containerRect.bottom - 100 || caretRect.top < containerRect.top + 100) {
                        caretSpan.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                }

                if (targetSub === targetText && targetText.length > 0) {
                    progressBar.style.width = '100%';
                    hiddenInput.disabled = true;
                    successOverlay.classList.add('active');
                }
            } else {
                hiddenInput.value = lastValidInput; 
                
                document.body.classList.remove('error-state');
                void document.body.offsetWidth; 
                document.body.classList.add('error-state');
                
                setTimeout(() => document.body.classList.remove('error-state'), 300);
            }
        }

        hiddenInput.addEventListener('input', processTyping);

        function updateSpans() {
            const typed = hiddenInput.value;
            const spans = textDisplay.querySelectorAll('span');
            
            for (let i = 0; i <= targetText.length; i++) {
                if(!spans[i]) continue;
                spans[i].className = '';
                
                if(keywordIndices.has(i)) {
                    spans[i].classList.add('is-keyword');
                }

                if (i < typed.length) {
                    spans[i].classList.add('correct');
                } else if (i === typed.length) {
                    spans[i].classList.add('caret');
                }
            }
        }

        function updateProgress() {
            let percent = 0;
            if (targetText.length > 0) {
                percent = (lastValidInput.length / targetText.length) * 100;
            }
            progressBar.style.width = `${Math.min(percent, 100)}%`;
        }

        btnRestart.addEventListener('click', () => {
            initText(targetText);
        });

        const defaultAppText = "A man's true self is often hidden behind his power. In King Lear, an arrogant king blindly divides his realm. Lear's decision to give away his kingdom is a desperate effort to achieve self-consciousness. He mistakenly believes his royal title is his true self; ultimately, his ignorance of his true identity becomes the tragic flaw that shatters his entire world.";

        applySettingsToUI();
        initText(defaultAppText);

    </script>
</body>
</html>
